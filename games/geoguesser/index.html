<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>🗺️ Utazó Nyomozó</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0f172a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
    h1{font-family:'Press Start 2P',monospace;font-size:0.9rem;color:#f6ad55;margin-bottom:16px;}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;max-width:500px;width:100%;text-align:center;}
    .clue{font-size:3rem;margin-bottom:8px;}
    .question{font-size:1rem;margin-bottom:4px;color:rgba(255,255,255,0.7);}
    .hint{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:16px;font-style:italic;}
    .options{display:flex;flex-direction:column;gap:8px;}
    .opt{padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:0.9rem;}
    .opt:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}
    .opt.correct{background:rgba(74,222,128,0.2);border-color:#4ade80;}
    .opt.wrong{background:rgba(239,68,68,0.2);border-color:#ef4444;}
    .score{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:#f6ad55;margin:12px 0;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.6rem;padding:10px 24px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
  </style>
</head>
<body>
  <h1>🗺️ Utazó Nyomozó</h1>
  <div class="score">Pont: <span id="score">0</span> / <span id="round">1</span></div>
  <div class="card" id="card"></div>
  <div style="margin-top:16px;"><a href="../../index.html" class="btn">← LAKÁSBA</a></div>
  <script>
    // Placeholder — user customizes with real trips
    const PLACES=[
      {emojis:'🌊☀️🏖️',question:'Hol nyaraltunk 2019-ben?',hint:'Adria partján...',answer:'Horvátország',options:['Horvátország','Görögország','Olaszország']},
      {emojis:'🏰🎡🍺',question:'Melyik városba mentünk hétvégére?',hint:'Óriáskerék a Praterben...',answer:'Bécs',options:['Bécs','Prága','Budapest']},
      {emojis:'🍕🍝🏛️',question:'Hol ettünk a legjobb pizzát?',hint:'Róma közelében...',answer:'Olaszország',options:['Olaszország','Spanyolország','Franciaország']},
      {emojis:'🌅🏊‍♂️🍦',question:'Hol voltunk a legtöbbször nyáron?',hint:'A magyar tenger...',answer:'Balaton',options:['Balaton','Velencei-tó','Tisza-tó']},
      {emojis:'🏰🍻🌉',question:'Hol sétáltunk a Károly-hídon?',hint:'Csehország fővárosa...',answer:'Prága',options:['Prága','Pozsony','Bécs']},
    ];

    let current=0,score=0,answered=false;
    const scoreEl=document.getElementById('score'),roundEl=document.getElementById('round'),cardEl=document.getElementById('card');

    function show(){
      answered=false;
      const p=PLACES[current];
      roundEl.textContent=current+1;
      cardEl.innerHTML=`
        <div class="clue">${p.emojis}</div>
        <div class="question">${p.question}</div>
        <div class="hint">${p.hint}</div>
        <div class="options">${p.options.sort(()=>Math.random()-0.5).map(o=>`<div class="opt" data-val="${o}">${o}</div>`).join('')}</div>
      `;
      cardEl.querySelectorAll('.opt').forEach(el=>{
        el.addEventListener('click',()=>{
          if(answered)return;answered=true;
          const correct=el.dataset.val===p.answer;
          el.classList.add(correct?'correct':'wrong');
          if(correct){score++;scoreEl.textContent=score;}
          else{cardEl.querySelector(`[data-val="${p.answer}"]`).classList.add('correct');}
          setTimeout(()=>{current++;if(current<PLACES.length)show();else{
            cardEl.innerHTML=`<div class="clue">🏆</div><div class="question">${score}/${PLACES.length} helyes!</div><button class="btn" onclick="current=0;score=0;scoreEl.textContent=0;show();">🔄 ÚJRA</button>`;
          }},1200);
        });
      });
    }
    show();
  </script>
</body>
</html>
