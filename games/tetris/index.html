<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎂 Birthday Tetris</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --pixel:'Press Start 2P',monospace; --mono:'JetBrains Mono',monospace; --accent:#f6ad55; --pink:#ec4899; --bg:#0f172a; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);overflow:hidden;height:100vh;font-family:var(--mono);display:flex;align-items:center;justify-content:center;}

    .game-wrap{display:flex;gap:16px;align-items:flex-start;}

    /* Side panels */
    .side-panel{width:100px;display:flex;flex-direction:column;gap:12px;}
    .panel-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px;text-align:center;}
    .panel-label{font-family:var(--pixel);font-size:0.35rem;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:6px;}
    .panel-value{font-family:var(--pixel);font-size:0.7rem;color:var(--accent);}
    .preview-canvas{width:80px;height:80px;display:block;margin:0 auto;border-radius:6px;}

    /* Main board */
    #board{display:block;border:2px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(0,0,0,0.3);}

    /* Overlays */
    .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);transition:opacity 0.4s;}
    .overlay.hidden{opacity:0;pointer-events:none;}
    .title{font-family:var(--pixel);color:var(--accent);text-shadow:3px 3px 0 rgba(0,0,0,0.5);text-align:center;}
    .btn{font-family:var(--pixel);font-size:0.7rem;padding:14px 32px;background:var(--pink);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:all 0.2s;margin:6px;text-decoration:none;display:inline-block;}
    .btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(236,72,153,0.4);}
    .btn--secondary{background:transparent;border:2px solid rgba(255,255,255,0.2);}

    .line-flash{position:fixed;left:0;right:0;height:4px;background:var(--accent);z-index:20;pointer-events:none;opacity:0;transition:opacity 0.1s;}
    .line-flash.visible{opacity:1;}

    @keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-15px) rotate(3deg);}}

    @media(max-width:600px){
      .side-panel{width:70px;}
      .game-wrap{gap:8px;}
      .panel-box{padding:6px;}
    }
  </style>
</head>
<body>
  <div class="game-wrap" id="game-wrap">
    <!-- Left panel -->
    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-label">TARTÁS</div>
        <canvas class="preview-canvas" id="hold-canvas" width="80" height="80"></canvas>
      </div>
      <div class="panel-box">
        <div class="panel-label">PONT</div>
        <div class="panel-value" id="score">0</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">SOROK</div>
        <div class="panel-value" id="lines">0</div>
      </div>
    </div>

    <!-- Board -->
    <canvas id="board"></canvas>

    <!-- Right panel -->
    <div class="side-panel">
      <div class="panel-box">
        <div class="panel-label">KÖVETKEZŐ</div>
        <canvas class="preview-canvas" id="next-canvas" width="80" height="80"></canvas>
      </div>
      <div class="panel-box">
        <div class="panel-label">SZINT</div>
        <div class="panel-value" id="level">1</div>
      </div>
      <div class="panel-box">
        <div class="panel-label">REKORD</div>
        <div class="panel-value" id="high" style="font-size:0.5rem;">0</div>
      </div>
    </div>
  </div>

  <div class="line-flash" id="line-flash"></div>

  <!-- Title -->
  <div class="overlay" id="title-screen">
    <div style="font-size:4rem;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;">🎂</div>
    <div class="title" style="font-size:clamp(1rem,4vw,1.8rem);margin-bottom:4px;">BIRTHDAY</div>
    <div class="title" style="font-size:clamp(0.7rem,3vw,1.3rem);color:#ec4899;margin-bottom:8px;">TETRIS</div>
    <div style="font-size:0.5rem;color:rgba(255,255,255,0.3);margin-bottom:24px;font-family:var(--pixel);letter-spacing:2px;">SZÜLINAPI KIADÁS</div>
    <button class="btn" id="btn-play">▶ JÁTÉK</button>
    <a href="../../index.html" class="btn btn--secondary">← HÁZBA</a>
    <div style="margin-top:20px;font-size:0.5rem;color:rgba(255,255,255,0.25);font-family:var(--pixel);text-align:center;line-height:2;">
      ← → MOZGATÁS &nbsp; ↑ FORGATÁS<br>↓ GYORS &nbsp; SPACE LEDOBÁS &nbsp; C TARTÁS
    </div>
  </div>

  <!-- Game Over -->
  <div class="overlay hidden" id="gameover-screen">
    <div style="font-size:3rem;margin-bottom:12px;">💥</div>
    <div class="title" style="font-size:1.2rem;margin-bottom:16px;">GAME OVER</div>
    <div style="font-family:var(--pixel);font-size:0.9rem;margin-bottom:4px;">PONT: <span id="final-score" style="color:var(--accent);">0</span></div>
    <div style="font-family:var(--pixel);font-size:0.55rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">REKORD: <span id="final-high">0</span></div>
    <button class="btn" id="btn-retry">🔄 ÚJRA</button>
    <a href="../../index.html" class="btn btn--secondary">← HÁZBA</a>
  </div>

  <script src="game.js"></script>
</body>
</html>
