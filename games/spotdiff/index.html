<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🔍 Spot the Difference</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0f172a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
    h1{font-family:'Press Start 2P',monospace;font-size:1rem;color:#f6ad55;margin-bottom:8px;}
    .sub{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:16px;}
    .boards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
    .board{display:grid;grid-template-columns:repeat(6,50px);grid-template-rows:repeat(6,50px);gap:2px;background:rgba(255,255,255,0.05);padding:4px;border-radius:8px;border:2px solid rgba(255,255,255,0.1);}
    .cell{display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;border-radius:4px;transition:all 0.2s;background:rgba(255,255,255,0.03);}
    .cell:hover{background:rgba(255,255,255,0.08);}
    .cell.found{background:rgba(74,222,128,0.2);border:2px solid #4ade80;}
    .cell.wrong{background:rgba(239,68,68,0.2);animation:shake 0.3s;}
    .hud{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:#f6ad55;margin:12px 0;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.6rem;padding:10px 24px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  </style>
</head>
<body>
  <h1>🔍 Rejtett Eltérések</h1>
  <p class="sub">Kattints a jobb oldali képen a különbségekre!</p>
  <div class="hud">Találat: <span id="found">0</span> / <span id="total">5</span></div>
  <div class="boards"><div class="board" id="board-left"></div><div class="board" id="board-right"></div></div>
  <div style="margin-top:16px;"><a href="../../index.html" class="btn">← HÁZBA</a><button class="btn" id="btn-new">🔄 ÚJ</button></div>
  <script>
    const EMOJIS=['🎂','🎁','🕯️','🧁','🎈','⭐','🍬','🎀','🎉','🏆','🎵','❤️','🔥','🍰','🎊','🫧'];
    const SIZE=6,DIFFS=5;
    let grid=[],diffCells=[],foundCount=0;

    function generate(){
      grid=[];diffCells=[];foundCount=0;
      document.getElementById('found').textContent=0;
      for(let r=0;r<SIZE;r++){grid[r]=[];for(let c=0;c<SIZE;c++){grid[r][c]=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];}}
      // Pick diff positions
      const positions=[];
      while(positions.length<DIFFS){
        const r=Math.floor(Math.random()*SIZE),c=Math.floor(Math.random()*SIZE);
        const key=r+','+c;
        if(!positions.includes(key))positions.push(key);
      }
      diffCells=positions;
      renderBoards();
    }

    function renderBoards(){
      const left=document.getElementById('board-left');
      const right=document.getElementById('board-right');
      left.innerHTML='';right.innerHTML='';
      for(let r=0;r<SIZE;r++){for(let c=0;c<SIZE;c++){
        const cellL=document.createElement('div');cellL.className='cell';cellL.textContent=grid[r][c];left.appendChild(cellL);
        const cellR=document.createElement('div');cellR.className='cell';
        const isDiff=diffCells.includes(r+','+c);
        if(isDiff){
          let alt;do{alt=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];}while(alt===grid[r][c]);
          cellR.textContent=alt;cellR.dataset.diff='true';
        }else{cellR.textContent=grid[r][c];}
        cellR.addEventListener('click',()=>{
          if(cellR.classList.contains('found'))return;
          if(cellR.dataset.diff){
            cellR.classList.add('found');cellL.classList.add('found');foundCount++;
            document.getElementById('found').textContent=foundCount;
            if(foundCount>=DIFFS)setTimeout(()=>alert('🏆 Mind megtaláltad!'),300);
          }else{cellR.classList.add('wrong');setTimeout(()=>cellR.classList.remove('wrong'),300);}
        });
        right.appendChild(cellR);
      }}
    }

    document.getElementById('btn-new').addEventListener('click',generate);
    generate();
  </script>
</body>
</html>
