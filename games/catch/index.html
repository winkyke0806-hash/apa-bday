<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🎁 Ajándék Eső</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0f172a;overflow:hidden;height:100vh;font-family:'JetBrains Mono',monospace;}
    canvas{display:block;width:100vw;height:100vh;cursor:none;}
    .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);transition:opacity 0.4s;}
    .overlay.hidden{opacity:0;pointer-events:none;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.7rem;padding:14px 32px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    .btn:hover{transform:scale(1.05);}
    .btn--s{background:transparent;border:2px solid rgba(255,255,255,0.2);}
    .hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:5;pointer-events:none;background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:8px;}
    .hud span{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:#f6ad55;}
    @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud"><span id="hud-score">0</span><span>|</span><span id="hud-lives">❤️❤️❤️</span><span>|</span><span id="hud-time">60</span></div>

  <div class="overlay" id="title-screen">
    <div style="font-size:4rem;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;">🎁</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:clamp(1rem,4vw,1.8rem);color:#f6ad55;margin-bottom:24px;">BIRTHDAY CATCH</div>
    <div style="font-size:0.6rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">Kapd el a hulló ajándékokat! Kerüld a bombákat!</div>
    <button class="btn" id="btn-play">▶ JÁTÉK</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <div class="overlay hidden" id="end-screen">
    <div style="font-size:3rem;margin-bottom:12px;">🏆</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:1rem;color:#f6ad55;margin-bottom:16px;">VÉGE!</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:0.8rem;margin-bottom:16px;">PONT: <span id="final-score" style="color:#f6ad55;">0</span></div>
    <button class="btn" id="btn-retry">🔄 ÚJRA</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <script src="game.js"></script>
</body>
</html>
