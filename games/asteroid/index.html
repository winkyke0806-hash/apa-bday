<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🚀 Csillagvadász</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0a0a1a;overflow:hidden;height:100vh;font-family:'JetBrains Mono',monospace;}
    canvas{display:block;width:100vw;height:100vh;}
    .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,26,0.92);backdrop-filter:blur(8px);transition:opacity 0.4s;}
    .overlay.hidden{opacity:0;pointer-events:none;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.7rem;padding:14px 32px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    .btn:hover{transform:scale(1.05);}
    .btn--s{background:transparent;border:2px solid rgba(255,255,255,0.2);}
    .hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:5;pointer-events:none;background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:8px;}
    .hud span{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:#f6ad55;}
    @keyframes bounce{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-15px) rotate(5deg);}}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud"><span id="hud-score">0</span><span>|</span><span id="hud-lives">❤️❤️❤️</span><span>|</span><span id="hud-wave">Hullám 1</span></div>

  <div class="overlay" id="title-screen">
    <div style="font-size:4rem;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;">🚀</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:clamp(1rem,4vw,1.6rem);color:#f6ad55;margin-bottom:4px;">CSILLAGVADÁSZ</div>
    <div style="font-size:0.5rem;color:rgba(255,255,255,0.3);margin-bottom:20px;font-family:'Press Start 2P',monospace;">SZÜLINAPI KÜLDETÉS</div>
    <div style="font-size:0.55rem;color:rgba(255,255,255,0.4);margin-bottom:16px;text-align:center;line-height:2;font-family:'Press Start 2P',monospace;">
      ← → MOZGÁS &nbsp; ↑ GÁZ<br>SPACE LÖVÉS
    </div>
    <button class="btn" id="btn-play">▶ JÁTÉK</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <div class="overlay hidden" id="end-screen">
    <div style="font-size:3rem;margin-bottom:12px;">💥</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:1rem;color:#f6ad55;margin-bottom:16px;">VÉGE!</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:0.8rem;margin-bottom:4px;">PONT: <span id="final-score" style="color:#f6ad55;">0</span></div>
    <div style="font-family:'Press Start 2P',monospace;font-size:0.5rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">REKORD: <span id="final-high">0</span></div>
    <button class="btn" id="btn-retry">🔄 ÚJRA</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <script>
    const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
    function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
    window.addEventListener('resize',resize);resize();

    let audioCtx;
    function beep(f,d,t='square',v=0.05){
      if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);
    }

    const keys={};
    window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
    window.addEventListener('keyup',e=>keys[e.key]=false);

    // Ship
    let ship={x:0,y:0,angle:0,vx:0,vy:0,size:15};
    let bullets=[],asteroids=[],particles=[],stars=[];
    let score=0,lives=3,wave=1,gameActive=false,frameCount=0,shootCooldown=0;
    let highScore=parseInt(localStorage.getItem('asteroid-high')||'0');

    // Stars background
    function initStars(){stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:0.5+Math.random()*1.5,b:0.3+Math.random()*0.7});}

    const ASTEROID_EMOJIS=['🎂','🎁','⭐','🧁','🎈','🍬','🎀','🕯️'];

    function spawnWave(){
      const count=3+wave*2;
      for(let i=0;i<count;i++){
        const edge=Math.floor(Math.random()*4);
        let x,y;
        if(edge===0){x=Math.random()*canvas.width;y=-30;}
        else if(edge===1){x=canvas.width+30;y=Math.random()*canvas.height;}
        else if(edge===2){x=Math.random()*canvas.width;y=canvas.height+30;}
        else{x=-30;y=Math.random()*canvas.height;}
        const speed=1+Math.random()*1.5+wave*0.2;
        const angle=Math.atan2(canvas.height/2-y,canvas.width/2-x)+((Math.random()-0.5)*1);
        asteroids.push({
          x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
          size:20+Math.random()*15,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.04,
          emoji:ASTEROID_EMOJIS[Math.floor(Math.random()*ASTEROID_EMOJIS.length)],
          hp:1+Math.floor(wave/3),
        });
      }
    }

    function update(){
      if(!gameActive)return;
      frameCount++;

      // Ship controls
      if(keys['ArrowLeft']||keys['a'])ship.angle-=0.06;
      if(keys['ArrowRight']||keys['d'])ship.angle+=0.06;
      if(keys['ArrowUp']||keys['w']){ship.vx+=Math.cos(ship.angle)*0.15;ship.vy+=Math.sin(ship.angle)*0.15;}
      if(keys[' ']&&shootCooldown<=0){
        bullets.push({x:ship.x+Math.cos(ship.angle)*ship.size,y:ship.y+Math.sin(ship.angle)*ship.size,vx:Math.cos(ship.angle)*8,vy:Math.sin(ship.angle)*8,life:50});
        shootCooldown=8;beep(800,0.05,'square',0.04);
      }
      shootCooldown--;

      // Ship physics
      ship.vx*=0.99;ship.vy*=0.99;
      ship.x+=ship.vx;ship.y+=ship.vy;
      // Wrap
      if(ship.x<0)ship.x=canvas.width;if(ship.x>canvas.width)ship.x=0;
      if(ship.y<0)ship.y=canvas.height;if(ship.y>canvas.height)ship.y=0;

      // Thrust particles
      if(keys['ArrowUp']||keys['w']){
        for(let i=0;i<2;i++){
          particles.push({x:ship.x-Math.cos(ship.angle)*ship.size,y:ship.y-Math.sin(ship.angle)*ship.size,
            vx:-Math.cos(ship.angle)*(2+Math.random()*2)+(Math.random()-0.5),vy:-Math.sin(ship.angle)*(2+Math.random()*2)+(Math.random()-0.5),
            life:10+Math.random()*8,maxLife:18,size:2+Math.random()*2,color:'#f6ad55'});
        }
      }

      // Bullets
      bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});
      bullets=bullets.filter(b=>b.life>0&&b.x>-10&&b.x<canvas.width+10&&b.y>-10&&b.y<canvas.height+10);

      // Asteroids
      asteroids.forEach(a=>{
        a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpeed;
        if(a.x<-50)a.x=canvas.width+50;if(a.x>canvas.width+50)a.x=-50;
        if(a.y<-50)a.y=canvas.height+50;if(a.y>canvas.height+50)a.y=-50;
      });

      // Bullet-asteroid collision
      bullets.forEach(b=>{
        asteroids.forEach(a=>{
          if(Math.hypot(b.x-a.x,b.y-a.y)<a.size){
            b.life=0;a.hp--;
            beep(300+Math.random()*200,0.08,'sine',0.06);
            for(let i=0;i<6;i++)particles.push({x:a.x,y:a.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:12,maxLife:12,size:2+Math.random()*3,color:'#f6ad55'});
            if(a.hp<=0){
              a.dead=true;score+=10*wave;
              beep(500,0.1,'sine',0.08);setTimeout(()=>beep(700,0.08,'sine',0.06),60);
              for(let i=0;i<12;i++)particles.push({x:a.x,y:a.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:18,maxLife:18,size:3+Math.random()*4,color:['#e94560','#f6ad55','#3b82f6','#22c55e'][Math.floor(Math.random()*4)]});
            }
          }
        });
      });
      asteroids=asteroids.filter(a=>!a.dead);

      // Ship-asteroid collision
      asteroids.forEach(a=>{
        if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.size+ship.size*0.7){
          lives--;a.dead=true;
          beep(100,0.3,'sawtooth',0.08);
          for(let i=0;i<15;i++)particles.push({x:ship.x,y:ship.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:20,maxLife:20,size:3,color:'#e94560'});
          ship.x=canvas.width/2;ship.y=canvas.height/2;ship.vx=0;ship.vy=0;
          document.getElementById('hud-lives').textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
          if(lives<=0)endGame();
        }
      });

      // Next wave
      if(asteroids.length===0){wave++;spawnWave();document.getElementById('hud-wave').textContent='Hullám '+wave;beep(523,0.1);setTimeout(()=>beep(659,0.1),80);setTimeout(()=>beep(784,0.12),160);}

      // Particles
      particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life--;});
      particles=particles.filter(p=>p.life>0);

      document.getElementById('hud-score').textContent=score;
    }

    function render(){
      const w=canvas.width,h=canvas.height;
      ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,w,h);

      // Stars
      stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.b*(0.5+Math.sin(frameCount*0.02+s.x)*0.5)})`;ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();});

      // Particles
      particles.forEach(p=>{const a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();});
      ctx.globalAlpha=1;

      // Asteroids
      asteroids.forEach(a=>{
        ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
        ctx.font=`${a.size}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(a.emoji,0,0);
        ctx.restore();
      });

      // Bullets
      ctx.fillStyle='#f6ad55';
      bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});

      // Ship
      if(gameActive&&lives>0){
        ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
        // Body
        ctx.fillStyle='#fff';ctx.beginPath();
        ctx.moveTo(ship.size,0);ctx.lineTo(-ship.size*0.7,-ship.size*0.6);ctx.lineTo(-ship.size*0.4,0);ctx.lineTo(-ship.size*0.7,ship.size*0.6);
        ctx.closePath();ctx.fill();
        // Cockpit
        ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(ship.size*0.2,0,4,0,Math.PI*2);ctx.fill();
        // Engine glow
        if(keys['ArrowUp']||keys['w']){
          ctx.fillStyle=`rgba(246,173,85,${0.3+Math.random()*0.4})`;
          ctx.beginPath();ctx.arc(-ship.size*0.6,0,4+Math.random()*3,0,Math.PI*2);ctx.fill();
        }
        ctx.restore();
      }
    }

    function gameLoop(){update();render();requestAnimationFrame(gameLoop);}

    function startGame(){
      if(audioCtx)audioCtx.resume();else audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      ship={x:canvas.width/2,y:canvas.height/2,angle:-Math.PI/2,vx:0,vy:0,size:15};
      bullets=[];asteroids=[];particles=[];score=0;lives=3;wave=1;frameCount=0;shootCooldown=0;
      gameActive=true;initStars();spawnWave();
      document.getElementById('hud-lives').textContent='❤️❤️❤️';
      document.getElementById('hud-wave').textContent='Hullám 1';
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
    }

    function endGame(){
      gameActive=false;
      if(score>highScore){highScore=score;localStorage.setItem('asteroid-high',highScore.toString());}
      setTimeout(()=>{document.getElementById('final-score').textContent=score;document.getElementById('final-high').textContent=highScore;document.getElementById('end-screen').classList.remove('hidden');},500);
    }

    document.getElementById('btn-play').addEventListener('click',startGame);
    document.getElementById('btn-retry').addEventListener('click',startGame);
    initStars();gameLoop();
  </script>
</body>
</html>
