<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dekoráció editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    .info { padding: 8px 12px; background: #222; font-size: 0.75rem; color: #f6ad55; }
    .toolbar { display: flex; gap: 8px; padding: 10px; background: #111; flex-wrap: wrap; align-items: center; }
    .toolbar button { font-family: monospace; padding: 6px 14px; border: 2px solid #444; background: #333; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .toolbar button:hover { background: #555; }
    .toolbar button.active { border-color: #e94560; background: #e94560; }
    .toolbar span { font-size: 0.75rem; color: #888; }
    canvas { flex: 1; cursor: crosshair; }
    .output { padding: 10px; background: #0a0a1a; font-size: 0.65rem; color: #4ade80; max-height: 130px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="info">
    🎨 Válassz típust, aztán <b>kattints</b> a pályára. A pálya körvonala háttérben látszik. Exportáld ha kész!
  </div>
  <div class="toolbar">
    <button class="active" data-type="tree">🌳 Fa</button>
    <button data-type="bush">🌿 Bokor</button>
    <button data-type="tire">⚫ Gumikorlát</button>
    <button data-type="grandstand">🏟️ Tribün</button>
    <button data-type="garage">🏠 Garázs</button>
    <button data-type="custom">⭐ Egyéb</button>
    <span>|</span>
    <button id="btn-undo">↩</button>
    <button id="btn-clear">🗑</button>
    <button id="btn-export" style="border-color:#4ade80;color:#4ade80;">📋 Export</button>
    <span id="count">0 elem</span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="output" id="output">Kattints a pályára elemek elhelyezéséhez...</div>

  <script>
    // Track from user (for background reference)
    const TRACK = [
      [0.49,0.084],[0.439,0.081],[0.371,0.087],[0.334,0.123],[0.321,0.187],[0.324,0.244],
      [0.332,0.308],[0.33,0.377],[0.319,0.438],[0.305,0.472],[0.279,0.501],[0.25,0.514],
      [0.218,0.523],[0.189,0.53],[0.165,0.533],[0.151,0.514],[0.138,0.466],[0.132,0.416],
      [0.125,0.318],[0.103,0.28],[0.076,0.273],[0.045,0.3],[0.028,0.346],[0.023,0.391],
      [0.02,0.509],[0.018,0.539],[0.018,0.666],[0.022,0.734],[0.032,0.788],[0.041,0.823],
      [0.053,0.859],[0.072,0.876],[0.099,0.888],[0.735,0.889],[0.878,0.891],[0.9,0.834],
      [0.91,0.783],[0.905,0.73],[0.891,0.691],[0.864,0.658],[0.818,0.609],[0.757,0.584],
      [0.71,0.591],[0.671,0.61],[0.628,0.641],[0.588,0.66],[0.549,0.666],[0.514,0.616],
      [0.513,0.534],[0.541,0.508],[0.579,0.497],[0.608,0.502],[0.624,0.46],[0.634,0.408],
      [0.638,0.344],[0.645,0.306],[0.667,0.271],[0.691,0.244],[0.713,0.242],[0.728,0.256],
      [0.734,0.277],[0.761,0.383],[0.771,0.43],[0.782,0.469],[0.797,0.509],[0.82,0.522],
      [0.845,0.51],[0.867,0.458],[0.869,0.387],[0.868,0.313],[0.858,0.187],[0.841,0.144],
      [0.821,0.116],[0.791,0.108],[0.685,0.091],[0.596,0.093],
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const output = document.getElementById('output');
    const countEl = document.getElementById('count');

    let items = [];
    let activeType = 'tree';

    // Type buttons
    document.querySelectorAll('[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.dataset.type;
      });
    });

    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      draw();
    }
    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) / canvas.width;
      const y = (e.clientY - rect.top) / canvas.height;
      items.push({ type: activeType, x: +x.toFixed(3), y: +y.toFixed(3) });
      countEl.textContent = items.length + ' elem';
      draw();
    });

    document.getElementById('btn-undo').addEventListener('click', () => {
      items.pop();
      countEl.textContent = items.length + ' elem';
      draw();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      items = [];
      countEl.textContent = '0 elem';
      draw();
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      if (!items.length) { output.textContent = 'Nincs elem!'; return; }
      const code = 'const DECORATIONS = ' + JSON.stringify(items, null, 2) + ';';
      output.textContent = code;
      navigator.clipboard.writeText(code).then(() => {
        output.textContent += '\n\n✅ VÁGÓLAPRA MÁSOLVA!';
      }).catch(() => {
        output.textContent += '\n\n⚠️ Jelöld ki és Ctrl+C';
      });
    });

    const ICONS = { tree: '🌳', bush: '🌿', tire: '⚫', grandstand: '🏟️', garage: '🏠', custom: '⭐' };
    const COLORS = { tree: '#22c55e', bush: '#16a34a', tire: '#555', grandstand: '#f6ad55', garage: '#e94560', custom: '#a855f7' };

    function draw() {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      // Dark grass bg
      ctx.fillStyle = '#1e4d1a';
      ctx.fillRect(0, 0, w, h);

      // Track reference (wide blue line)
      ctx.beginPath();
      TRACK.forEach((p, i) => {
        const px = p[0] * w, py = p[1] * h;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.strokeStyle = 'rgba(100,170,255,0.25)';
      ctx.lineWidth = Math.min(w, h) * 0.08;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(100,170,255,0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Items
      items.forEach((item, idx) => {
        const px = item.x * w, py = item.y * h;
        const color = COLORS[item.type] || '#fff';

        // Circle marker
        ctx.beginPath();
        ctx.arc(px, py, 8, 0, Math.PI * 2);
        ctx.fillStyle = color + '44';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Icon
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(ICONS[item.type] || '⭐', px, py + 5);

        // Number
        ctx.fillStyle = '#fff';
        ctx.font = '9px monospace';
        ctx.fillText(idx + 1, px, py - 12);
      });
    }
  </script>
</body>
</html>
