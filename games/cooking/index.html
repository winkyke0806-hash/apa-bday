<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>🍳 Reakció Konyha</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0f172a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;user-select:none;}
    h1{font-family:'Press Start 2P',monospace;font-size:0.9rem;color:#f6ad55;margin-bottom:8px;}
    .sub{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:20px;text-align:center;}
    .pot{width:200px;height:200px;background:radial-gradient(circle at 50% 60%,#555,#333);border-radius:50% 50% 45% 45%;display:flex;align-items:center;justify-content:center;font-size:4rem;margin:20px 0;border:4px solid #666;position:relative;cursor:pointer;transition:all 0.2s;}
    .pot.ready{border-color:#4ade80;box-shadow:0 0 30px rgba(74,222,128,0.4);animation:pulse 0.8s ease-in-out infinite;}
    .pot.hit{border-color:#f6ad55;box-shadow:0 0 30px rgba(246,173,85,0.5);}
    .pot.fail{border-color:#ef4444;box-shadow:0 0 30px rgba(239,68,68,0.4);}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    .timer-bar{width:200px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin:12px 0;}
    .timer-fill{height:100%;background:linear-gradient(90deg,#22c55e,#f6ad55,#ef4444);border-radius:4px;transition:width 0.1s;}
    .result{font-family:'Press Start 2P',monospace;font-size:0.7rem;min-height:24px;margin:8px 0;}
    .score-display{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:#f6ad55;margin:8px 0;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.6rem;padding:10px 24px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    .round-info{font-family:'Press Start 2P',monospace;font-size:0.5rem;color:rgba(255,255,255,0.4);margin:4px 0;}
  </style>
</head>
<body>
  <h1>🍳 Reakció Konyha</h1>
  <p class="sub">Nyomd meg a fazekat PONT amikor zöldre vált!<br>Túl korán = megég, túl későn = kihűl!</p>
  <div class="score-display">Pont: <span id="score">0</span> | Kör: <span id="round">0</span>/10</div>
  <div class="pot" id="pot">🍳</div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:0%"></div></div>
  <div class="result" id="result"></div>
  <div class="round-info" id="info">Kattints a fazékra az indításhoz!</div>
  <div style="margin-top:12px;"><a href="../../index.html" class="btn">← HÁZBA</a></div>

  <script>
    const FOODS=['🍳','🥘','🍲','🍝','🥞','🍕','🧇','🫕'];
    const pot=document.getElementById('pot');
    const timerFill=document.getElementById('timer-fill');
    const resultEl=document.getElementById('result');
    const infoEl=document.getElementById('info');
    let state='idle',score=0,round=0,totalRounds=10,readyTime=0,reactionStart=0;
    let timeout=null;

    let audioCtx;
    function beep(f,d){
      if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;g.gain.value=0.06;
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);
    }

    pot.addEventListener('click',()=>{
      if(state==='idle'||state==='done'){startRound();return;}
      if(state==='waiting'){
        // Too early!
        clearTimeout(timeout);
        pot.className='pot fail';pot.textContent='💨';
        resultEl.textContent='Túl korán! A palacsinta megégett!';resultEl.style.color='#ef4444';
        beep(150,0.2);state='done';round++;updateHUD();
        if(round>=totalRounds)setTimeout(endGame,1000);
        return;
      }
      if(state==='ready'){
        // Hit!
        const reaction=Date.now()-reactionStart;
        clearTimeout(timeout);
        const pts=Math.max(5,Math.round(200-reaction));
        score+=pts;
        pot.className='pot hit';
        resultEl.textContent=`${reaction}ms — +${pts} pont!`;
        resultEl.style.color=reaction<200?'#4ade80':reaction<400?'#f6ad55':'#fff';
        beep(600,0.1);setTimeout(()=>beep(800,0.08),60);
        timerFill.style.width=Math.min(100,Math.max(0,100-reaction/5))+'%';
        state='done';round++;updateHUD();
        if(round>=totalRounds)setTimeout(endGame,1000);
      }
    });

    function startRound(){
      state='waiting';
      pot.className='pot';
      pot.textContent=FOODS[Math.floor(Math.random()*FOODS.length)];
      resultEl.textContent='';infoEl.textContent='Várj... és nyomj ha zöld!';
      timerFill.style.width='0%';

      const delay=1500+Math.random()*3000;
      timeout=setTimeout(()=>{
        state='ready';
        pot.className='pot ready';
        reactionStart=Date.now();
        beep(440,0.1);
        // Auto-fail after 2 seconds
        timeout=setTimeout(()=>{
          if(state==='ready'){
            pot.className='pot fail';pot.textContent='🧊';
            resultEl.textContent='Túl lassú! Kihűlt az étel!';resultEl.style.color='#3b82f6';
            beep(200,0.2);state='done';round++;updateHUD();
            if(round>=totalRounds)setTimeout(endGame,1000);
          }
        },2000);
      },delay);
    }

    function updateHUD(){
      document.getElementById('score').textContent=score;
      document.getElementById('round').textContent=round;
    }

    function endGame(){
      const avg=round>0?Math.round(score/round):0;
      infoEl.textContent='';
      resultEl.innerHTML=`🏆 Végeredmény: ${score} pont<br><span style="font-size:0.5rem;color:rgba(255,255,255,0.4);">Átlag: ${avg} pont/kör</span>`;
      resultEl.style.color='#f6ad55';
      pot.className='pot';pot.textContent='🏆';
      state='idle';round=0;score=0;
    }

    updateHUD();
  </script>
</body>
</html>
