<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🐍 Szülinapi Kígyó</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{background:#0f172a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
    canvas{border:2px solid rgba(255,255,255,0.15);border-radius:8px;background:#0a0f1a;display:block;}
    .hud{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:#f6ad55;margin:10px 0;display:flex;gap:20px;}
    .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);transition:opacity 0.4s;}
    .overlay.hidden{opacity:0;pointer-events:none;}
    .btn{font-family:'Press Start 2P',monospace;font-size:0.65rem;padding:12px 28px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    .btn:hover{transform:scale(1.05);}
    .btn--s{background:transparent;border:2px solid rgba(255,255,255,0.2);}
    @keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-15px) rotate(3deg);}}
  </style>
</head>
<body>
  <div class="hud"><span>PONT: <span id="score">0</span></span><span>REKORD: <span id="high">0</span></span></div>
  <canvas id="game"></canvas>

  <div class="overlay" id="title-screen">
    <div style="font-size:4rem;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;">🐍</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:clamp(0.9rem,3vw,1.4rem);color:#f6ad55;margin-bottom:4px;">SZÜLINAPI KÍGYÓ</div>
    <div style="font-size:0.5rem;color:rgba(255,255,255,0.3);margin-bottom:16px;font-family:'Press Start 2P',monospace;">Gyűjtsd össze a csemegéket!</div>
    <div style="font-size:0.5rem;color:rgba(255,255,255,0.4);margin-bottom:16px;text-align:center;line-height:2;font-family:'Press Start 2P',monospace;">WASD / Nyilak</div>
    <button class="btn" id="btn-play">▶ JÁTÉK</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <div class="overlay hidden" id="end-screen">
    <div style="font-size:3rem;margin-bottom:12px;">💥</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:1rem;color:#f6ad55;margin-bottom:16px;">VÉGE!</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:0.8rem;margin-bottom:4px;">PONT: <span id="final-score" style="color:#f6ad55;">0</span></div>
    <div style="font-family:'Press Start 2P',monospace;font-size:0.5rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">REKORD: <span id="final-high">0</span></div>
    <button class="btn" id="btn-retry">🔄 ÚJRA</button>
    <a href="../../index.html" class="btn btn--s">← LAKÁSBA</a>
  </div>

  <script>
    const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
    const CELL=20,COLS=25,ROWS=25;
    canvas.width=COLS*CELL;canvas.height=ROWS*CELL;

    let audioCtx;
    function beep(f,d){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0.06;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}

    const FOODS=['🎂','🎁','⭐','🧁','🍬','🎈','🕯️','🍰','🎀'];
    let snake=[],dir={x:1,y:0},nextDir={x:1,y:0},food={x:0,y:0,emoji:'🎂'},score=0,gameActive=false,speed=120,interval=null;
    let highScore=parseInt(localStorage.getItem('snake-high')||'0');
    let particles=[];

    function spawnFood(){
      do{food.x=Math.floor(Math.random()*COLS);food.y=Math.floor(Math.random()*ROWS);}
      while(snake.some(s=>s.x===food.x&&s.y===food.y));
      food.emoji=FOODS[Math.floor(Math.random()*FOODS.length)];
    }

    function update(){
      dir=nextDir;
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

      // Wall collision
      if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){die();return;}
      // Self collision
      if(snake.some(s=>s.x===head.x&&s.y===head.y)){die();return;}

      snake.unshift(head);

      if(head.x===food.x&&head.y===food.y){
        score+=10;
        beep(523,0.08);setTimeout(()=>beep(659,0.08),50);setTimeout(()=>beep(784,0.1),100);
        // Particles
        for(let i=0;i<8;i++)particles.push({x:food.x*CELL+CELL/2,y:food.y*CELL+CELL/2,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:15,maxLife:15,size:3,color:['#f6ad55','#ec4899','#22c55e'][Math.floor(Math.random()*3)]});
        spawnFood();
        // Speed up
        if(score%50===0&&speed>60){speed-=10;clearInterval(interval);interval=setInterval(update,speed);}
      }else{
        snake.pop();
      }

      document.getElementById('score').textContent=score;
      render();
    }

    function render(){
      ctx.fillStyle='#0a0f1a';ctx.fillRect(0,0,canvas.width,canvas.height);

      // Grid
      ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
      for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke();}
      for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke();}

      // Snake
      snake.forEach((s,i)=>{
        const isHead=i===0;
        const brightness=1-i/(snake.length+5)*0.5;
        if(isHead){
          // Head — gradient
          const grad=ctx.createRadialGradient(s.x*CELL+CELL/2,s.y*CELL+CELL/2,0,s.x*CELL+CELL/2,s.y*CELL+CELL/2,CELL/2);
          grad.addColorStop(0,'#4ade80');grad.addColorStop(1,'#16a34a');
          ctx.fillStyle=grad;
        }else{
          ctx.fillStyle=`rgba(74,222,128,${brightness})`;
        }
        ctx.beginPath();
        ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,isHead?5:3);
        ctx.fill();

        // Eyes on head
        if(isHead){
          ctx.fillStyle='#fff';
          const ex1=s.x*CELL+CELL/2+dir.x*3-dir.y*3;
          const ey1=s.y*CELL+CELL/2+dir.y*3+dir.x*3;
          const ex2=s.x*CELL+CELL/2+dir.x*3+dir.y*3;
          const ey2=s.y*CELL+CELL/2+dir.y*3-dir.x*3;
          ctx.beginPath();ctx.arc(ex1,ey1,2.5,0,Math.PI*2);ctx.fill();
          ctx.beginPath();ctx.arc(ex2,ey2,2.5,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#111';
          ctx.beginPath();ctx.arc(ex1+dir.x,ey1+dir.y,1.2,0,Math.PI*2);ctx.fill();
          ctx.beginPath();ctx.arc(ex2+dir.x,ey2+dir.y,1.2,0,Math.PI*2);ctx.fill();
        }
      });

      // Food
      ctx.font=`${CELL-4}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(food.emoji,food.x*CELL+CELL/2,food.y*CELL+CELL/2+1);
      // Food glow
      ctx.fillStyle='rgba(246,173,85,0.08)';
      ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL,0,Math.PI*2);ctx.fill();

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
        p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;
      });
      ctx.globalAlpha=1;
      particles=particles.filter(p=>p.life>0);
    }

    function die(){
      gameActive=false;clearInterval(interval);
      beep(200,0.3);setTimeout(()=>beep(100,0.4),150);
      if(score>highScore){highScore=score;localStorage.setItem('snake-high',highScore.toString());}
      setTimeout(()=>{
        document.getElementById('final-score').textContent=score;
        document.getElementById('final-high').textContent=highScore;
        document.getElementById('end-screen').classList.remove('hidden');
      },400);
    }

    function startGame(){
      if(audioCtx)audioCtx.resume();
      snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
      dir={x:1,y:0};nextDir={x:1,y:0};score=0;speed=120;particles=[];
      gameActive=true;spawnFood();
      document.getElementById('score').textContent=0;
      document.getElementById('high').textContent=highScore;
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
      clearInterval(interval);interval=setInterval(update,speed);
      render();
    }

    // Input
    window.addEventListener('keydown',e=>{
      if(!gameActive)return;
      if((e.key==='ArrowUp'||e.key==='w')&&dir.y!==1)nextDir={x:0,y:-1};
      if((e.key==='ArrowDown'||e.key==='s')&&dir.y!==-1)nextDir={x:0,y:1};
      if((e.key==='ArrowLeft'||e.key==='a')&&dir.x!==1)nextDir={x:-1,y:0};
      if((e.key==='ArrowRight'||e.key==='d')&&dir.x!==-1)nextDir={x:1,y:0};
    });

    // Touch swipe
    let tx=0,ty=0;
    canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
    canvas.addEventListener('touchend',e=>{
      e.preventDefault();const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==- 1)nextDir={x:1,y:0};else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0};}
      else{if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1};}
    });

    document.getElementById('btn-play').addEventListener('click',startGame);
    document.getElementById('btn-retry').addEventListener('click',startGame);
    render();
  </script>
</body>
</html>
