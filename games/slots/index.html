<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>🔨 Birthday Whack!</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--pixel:'Press Start 2P',monospace;--accent:#f6ad55;--bg:#0f172a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:#fff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;user-select:none;}
    h1{font-family:var(--pixel);font-size:0.9rem;color:var(--accent);margin-bottom:4px;}
    .sub{font-size:0.65rem;color:rgba(255,255,255,0.4);margin-bottom:12px;}
    .hud{font-family:var(--pixel);font-size:0.55rem;color:var(--accent);margin-bottom:12px;display:flex;gap:16px;}
    .grid{display:grid;grid-template-columns:repeat(3,110px);grid-template-rows:repeat(3,110px);gap:10px;}
    .hole{background:radial-gradient(ellipse at 50% 70%,#1a1008,#2a1a0a 60%,#0f172a 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:3px solid #3a2a10;transition:border-color 0.1s;}
    .hole:active{border-color:var(--accent);}
    .mole{font-size:2.8rem;transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),opacity 0.15s;transform:translateY(60px);opacity:0;pointer-events:none;position:absolute;}
    .mole.up{transform:translateY(0);opacity:1;}
    .mole.hit{transform:translateY(0) scale(1.3) rotate(15deg);opacity:0.5;filter:brightness(2);}
    .hit-fx{position:absolute;font-family:var(--pixel);font-size:0.5rem;color:var(--accent);pointer-events:none;opacity:0;transition:all 0.4s;transform:translateY(0);}
    .hit-fx.show{opacity:1;transform:translateY(-30px);}
    .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(15,23,42,0.92);backdrop-filter:blur(8px);transition:opacity 0.4s;}
    .overlay.hidden{opacity:0;pointer-events:none;}
    .btn{font-family:var(--pixel);font-size:0.65rem;padding:12px 28px;background:#ec4899;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:6px;text-decoration:none;display:inline-block;}
    .btn:hover{transform:scale(1.05);}
    .btn--s{background:transparent;border:2px solid rgba(255,255,255,0.2);}
    .timer-bar{width:250px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;margin:8px 0;}
    .timer-fill{height:100%;background:linear-gradient(90deg,#22c55e,#f6ad55,#ef4444);border-radius:4px;transition:width 0.3s;}
    @keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-15px) rotate(3deg);}}
  </style>
</head>
<body>
  <h1>🔨 Birthday Whack!</h1>
  <p class="sub">Üsd meg a felbukkanó szülinapi tárgyakat!</p>
  <div class="hud">
    <span>PONT: <span id="score">0</span></span>
    <span>IDŐ: <span id="timer">30</span></span>
    <span>🔥 <span id="combo">0</span>x</span>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  <div class="grid" id="grid"></div>

  <div class="overlay" id="title-screen">
    <div style="font-size:4rem;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite;">🔨</div>
    <div style="font-family:var(--pixel);font-size:clamp(0.8rem,3vw,1.3rem);color:var(--accent);margin-bottom:4px;">BIRTHDAY WHACK!</div>
    <div style="font-size:0.55rem;color:rgba(255,255,255,0.4);margin-bottom:20px;text-align:center;line-height:2;">Üsd meg a szülinapi tárgyakat!<br>🎂=10 🎁=15 ⭐=25 💣=KERÜLD!</div>
    <button class="btn" id="btn-play">▶ JÁTÉK</button>
    <a href="../../index.html" class="btn btn--s">← HÁZBA</a>
  </div>

  <div class="overlay hidden" id="end-screen">
    <div style="font-size:3rem;margin-bottom:12px;">🏆</div>
    <div style="font-family:var(--pixel);font-size:1rem;color:var(--accent);margin-bottom:16px;">VÉGE!</div>
    <div style="font-family:var(--pixel);font-size:0.8rem;margin-bottom:4px;">PONT: <span id="final-score" style="color:var(--accent);">0</span></div>
    <div style="font-family:var(--pixel);font-size:0.5rem;color:rgba(255,255,255,0.4);margin-bottom:4px;">MAX COMBO: <span id="final-combo">0</span>x</div>
    <div style="font-family:var(--pixel);font-size:0.5rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">REKORD: <span id="final-high">0</span></div>
    <button class="btn" id="btn-retry">🔄 ÚJRA</button>
    <a href="../../index.html" class="btn btn--s">← HÁZBA</a>
  </div>

  <script>
    const MOLES = [
      { emoji: '🎂', pts: 10, color: '#ec4899' },
      { emoji: '🎁', pts: 15, color: '#e94560' },
      { emoji: '⭐', pts: 25, color: '#f6ad55' },
      { emoji: '🧁', pts: 8, color: '#a855f7' },
      { emoji: '🎈', pts: 12, color: '#3b82f6' },
    ];
    const BOMB = { emoji: '💣', pts: -20, color: '#555' };
    const GAME_TIME = 30;

    let audioCtx;
    function beep(f, d) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = f; g.gain.value = 0.06;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
      o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    let score = 0, combo = 0, maxCombo = 0, timer = GAME_TIME, gameActive = false;
    let highScore = parseInt(localStorage.getItem('whack-high') || '0');
    let holes = [], spawnInterval, timerInterval;

    // Build grid
    const gridEl = document.getElementById('grid');
    for (let i = 0; i < 9; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';
      hole.dataset.idx = i;

      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.dataset.idx = i;

      const hitFx = document.createElement('div');
      hitFx.className = 'hit-fx';

      hole.appendChild(mole);
      hole.appendChild(hitFx);

      hole.addEventListener('click', () => whack(i));
      hole.addEventListener('touchstart', (e) => { e.preventDefault(); whack(i); });

      gridEl.appendChild(hole);
      holes.push({ el: hole, mole, hitFx, active: false, type: null, timer: 0 });
    }

    function whack(idx) {
      if (!gameActive) return;
      const h = holes[idx];
      if (!h.active) {
        combo = 0;
        return;
      }

      h.active = false;
      const type = h.type;
      const pts = type.pts * (1 + Math.floor(combo / 4));

      if (type.pts > 0) {
        score += pts;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        beep(600 + Math.random() * 200, 0.08);
        h.mole.classList.add('hit');
        setTimeout(() => { h.mole.classList.remove('up', 'hit'); }, 200);
      } else {
        score = Math.max(0, score + type.pts);
        combo = 0;
        beep(150, 0.2);
        h.mole.classList.remove('up');
        // Screen flash red
        document.body.style.background = '#2a0a0a';
        setTimeout(() => document.body.style.background = '#0f172a', 150);
      }

      // Hit effect
      h.hitFx.textContent = (type.pts > 0 ? '+' : '') + pts;
      h.hitFx.style.color = type.color;
      h.hitFx.classList.remove('show');
      void h.hitFx.offsetWidth;
      h.hitFx.classList.add('show');
      setTimeout(() => h.hitFx.classList.remove('show'), 400);

      updateHUD();
    }

    function spawnMole() {
      // Find empty holes
      const empty = holes.filter(h => !h.active);
      if (empty.length === 0) return;

      const h = empty[Math.floor(Math.random() * empty.length)];
      const isBomb = Math.random() < 0.15;
      h.type = isBomb ? BOMB : MOLES[Math.floor(Math.random() * MOLES.length)];
      h.active = true;
      h.mole.textContent = h.type.emoji;
      h.mole.classList.add('up');

      // Auto-hide after time
      const showTime = Math.max(500, 1200 - (GAME_TIME - timer) * 20);
      setTimeout(() => {
        if (h.active) {
          h.active = false;
          h.mole.classList.remove('up');
          if (h.type.pts > 0) combo = 0; // missed = reset combo
        }
      }, showTime);
    }

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('timer').textContent = timer;
      document.getElementById('combo').textContent = combo;
      document.getElementById('timer-fill').style.width = (timer / GAME_TIME * 100) + '%';
    }

    function startGame() {
      if (audioCtx) audioCtx.resume();
      else audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      score = 0; combo = 0; maxCombo = 0; timer = GAME_TIME;
      gameActive = true;
      holes.forEach(h => { h.active = false; h.mole.classList.remove('up', 'hit'); });
      updateHUD();

      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');

      // Spawn moles
      clearInterval(spawnInterval);
      clearInterval(timerInterval);

      spawnInterval = setInterval(() => {
        if (!gameActive) return;
        spawnMole();
        // Spawn faster as time progresses
        if (Math.random() < 0.3 + (GAME_TIME - timer) * 0.015) spawnMole();
      }, 600);

      timerInterval = setInterval(() => {
        timer--;
        updateHUD();
        if (timer <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      gameActive = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      holes.forEach(h => { h.active = false; h.mole.classList.remove('up'); });

      if (score > highScore) { highScore = score; localStorage.setItem('whack-high', highScore.toString()); }

      setTimeout(() => {
        document.getElementById('final-score').textContent = score;
        document.getElementById('final-combo').textContent = maxCombo;
        document.getElementById('final-high').textContent = highScore;
        document.getElementById('end-screen').classList.remove('hidden');
      }, 500);
    }

    document.getElementById('btn-play').addEventListener('click', startGame);
    document.getElementById('btn-retry').addEventListener('click', startGame);
  </script>
</body>
</html>
