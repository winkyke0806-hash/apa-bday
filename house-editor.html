<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 Ház tervrajz editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a1628; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    .info { padding: 10px 14px; background: #1a2540; font-size: 0.75rem; color: #f6ad55; line-height: 1.6; }
    .toolbar { display: flex; gap: 8px; padding: 8px 12px; background: #111; flex-wrap: wrap; align-items: center; }
    .toolbar button { font-family: monospace; padding: 6px 12px; border: 2px solid #444; background: #333; color: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .toolbar button:hover { background: #555; }
    .toolbar button.active { border-color: #f6ad55; background: rgba(246,173,85,0.15); color: #f6ad55; }
    .toolbar span { font-size: 0.7rem; color: #888; }
    canvas { flex: 1; cursor: crosshair; }
    .output { padding: 10px; background: #050a15; font-size: 0.6rem; color: #4ade80; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="info">
    🏠 <b>Rajzold meg a lakás alaprajzát!</b><br>
    1. Válassz eszközt: <b>Fal</b> (kattints 2 pontot), <b>Ajtó</b> (kattints falra), <b>Szoba név</b> (kattints + írd be)<br>
    2. Az <b>Exportálás</b> gomb kimásolja a JSON-t — küldd el nekem!
  </div>
  <div class="toolbar">
    <button class="active" data-tool="wall">🧱 Fal</button>
    <button data-tool="door">🚪 Ajtó</button>
    <button data-tool="label">📝 Szoba név</button>
    <span>|</span>
    <button id="btn-undo">↩ Vissza</button>
    <button id="btn-clear">🗑 Törlés</button>
    <button id="btn-grid">📐 Rács ki/be</button>
    <button id="btn-export" style="border-color:#4ade80;color:#4ade80;">📋 Exportálás</button>
    <span id="status">0 elem</span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="output" id="output">Kezdj el rajzolni...</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const output = document.getElementById('output');
    const statusEl = document.getElementById('status');

    let tool = 'wall';
    let showGrid = true;
    let elements = []; // {type:'wall',x1,y1,x2,y2} | {type:'door',x,y} | {type:'label',x,y,text}
    let tempPoint = null; // first click for wall

    // Tool buttons
    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        tool = btn.dataset.tool;
        tempPoint = null;
        document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    function resize() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      draw();
    }
    window.addEventListener('resize', resize);
    resize();

    // Snap to grid
    function snap(v) { return showGrid ? Math.round(v / 20) * 20 : v; }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = snap(e.clientX - rect.left);
      const y = snap(e.clientY - rect.top);

      if (tool === 'wall') {
        if (!tempPoint) {
          tempPoint = { x, y };
        } else {
          elements.push({ type: 'wall', x1: tempPoint.x, y1: tempPoint.y, x2: x, y2: y });
          tempPoint = null;
        }
      } else if (tool === 'door') {
        elements.push({ type: 'door', x, y });
      } else if (tool === 'label') {
        const text = prompt('Szoba neve:');
        if (text) elements.push({ type: 'label', x, y, text });
      }

      statusEl.textContent = elements.length + ' elem';
      draw();
    });

    // Mouse move for wall preview
    canvas.addEventListener('mousemove', (e) => {
      if (tool === 'wall' && tempPoint) {
        draw();
        const rect = canvas.getBoundingClientRect();
        const x = snap(e.clientX - rect.left);
        const y = snap(e.clientY - rect.top);
        ctx.strokeStyle = 'rgba(246,173,85,0.5)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(tempPoint.x, tempPoint.y);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    });

    document.getElementById('btn-undo').addEventListener('click', () => {
      elements.pop();
      tempPoint = null;
      statusEl.textContent = elements.length + ' elem';
      draw();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      elements = [];
      tempPoint = null;
      statusEl.textContent = '0 elem';
      output.textContent = 'Kezdj el rajzolni...';
      draw();
    });

    document.getElementById('btn-grid').addEventListener('click', () => {
      showGrid = !showGrid;
      draw();
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      if (!elements.length) { output.textContent = 'Nincs elem!'; return; }
      const w = canvas.width, h = canvas.height;
      // Normalize to 0-1
      const normalized = elements.map(el => {
        if (el.type === 'wall') return { type: 'wall', x1: +(el.x1/w).toFixed(3), y1: +(el.y1/h).toFixed(3), x2: +(el.x2/w).toFixed(3), y2: +(el.y2/h).toFixed(3) };
        if (el.type === 'door') return { type: 'door', x: +(el.x/w).toFixed(3), y: +(el.y/h).toFixed(3) };
        if (el.type === 'label') return { type: 'label', x: +(el.x/w).toFixed(3), y: +(el.y/h).toFixed(3), text: el.text };
      });
      const code = JSON.stringify(normalized, null, 2);
      output.textContent = code;
      navigator.clipboard.writeText(code).then(() => {
        output.textContent += '\n\n✅ VÁGÓLAPRA MÁSOLVA!';
      }).catch(() => {
        output.textContent += '\n\n⚠️ Jelöld ki és Ctrl+C';
      });
    });

    function draw() {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      // Blueprint background
      ctx.fillStyle = '#0a1628';
      ctx.fillRect(0, 0, w, h);

      // Grid
      if (showGrid) {
        ctx.strokeStyle = 'rgba(65,140,255,0.06)';
        ctx.lineWidth = 1;
        for (let x = 0; x < w; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (let y = 0; y < h; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
        // Major grid
        ctx.strokeStyle = 'rgba(65,140,255,0.12)';
        for (let x = 0; x < w; x += 100) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
        for (let y = 0; y < h; y += 100) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
      }

      // Elements
      elements.forEach((el, idx) => {
        if (el.type === 'wall') {
          ctx.strokeStyle = 'rgba(120,180,255,0.7)';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(el.x1, el.y1);
          ctx.lineTo(el.x2, el.y2);
          ctx.stroke();
          // Wall thickness
          ctx.strokeStyle = 'rgba(120,180,255,0.3)';
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(el.x1, el.y1);
          ctx.lineTo(el.x2, el.y2);
          ctx.stroke();
          // Endpoints
          ctx.fillStyle = '#f6ad55';
          ctx.beginPath(); ctx.arc(el.x1, el.y1, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(el.x2, el.y2, 3, 0, Math.PI * 2); ctx.fill();
          // Length label
          const len = Math.hypot(el.x2 - el.x1, el.y2 - el.y1);
          const mx = (el.x1 + el.x2) / 2, my = (el.y1 + el.y2) / 2;
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(Math.round(len) + 'px', mx, my - 8);
        }

        if (el.type === 'door') {
          // Door arc
          ctx.strokeStyle = '#f6ad55';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(el.x, el.y, 30, -Math.PI / 2, 0);
          ctx.stroke();
          // Door lines
          ctx.beginPath();
          ctx.moveTo(el.x, el.y);
          ctx.lineTo(el.x + 30, el.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(el.x, el.y);
          ctx.lineTo(el.x, el.y - 30);
          ctx.stroke();
          // Gap in wall
          ctx.fillStyle = '#0a1628';
          ctx.fillRect(el.x - 2, el.y - 5, 34, 10);
        }

        if (el.type === 'label') {
          ctx.fillStyle = 'rgba(246,173,85,0.6)';
          ctx.font = 'bold 12px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(el.text, el.x, el.y);
          // Dotted border
          ctx.strokeStyle = 'rgba(246,173,85,0.15)';
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          ctx.strokeRect(el.x - 40, el.y - 14, 80, 20);
          ctx.setLineDash([]);
        }
      });

      // Temp point (first wall click)
      if (tempPoint) {
        ctx.fillStyle = '#f6ad55';
        ctx.beginPath(); ctx.arc(tempPoint.x, tempPoint.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(246,173,85,0.3)';
        ctx.beginPath(); ctx.arc(tempPoint.x, tempPoint.y, 10, 0, Math.PI * 2); ctx.fill();
      }
    }
  </script>
</body>
</html>
