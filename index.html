<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 Boldog Szülinapot, Apu!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ═══ Loading Screen ═══ -->
  <div id="loading-screen" class="loading-screen">
    <svg class="loading-svg" viewBox="0 0 200 200" width="120" height="120">
      <rect x="20" y="20" width="160" height="160" fill="none" stroke="rgba(120,180,255,0.3)" stroke-width="1" stroke-dasharray="4 4" class="loading-outer"/>
      <line x1="20" y1="100" x2="180" y2="100" stroke="rgba(120,180,255,0.15)" stroke-width="0.5" class="loading-line"/>
      <line x1="100" y1="20" x2="100" y2="180" stroke="rgba(120,180,255,0.15)" stroke-width="0.5" class="loading-line"/>
      <rect x="40" y="40" width="50" height="50" fill="none" stroke="rgba(120,180,255,0.4)" stroke-width="1.5" class="loading-room"/>
      <rect x="110" y="40" width="50" height="50" fill="none" stroke="rgba(120,180,255,0.4)" stroke-width="1.5" class="loading-room" style="animation-delay:0.2s"/>
      <rect x="40" y="110" width="50" height="50" fill="none" stroke="rgba(120,180,255,0.4)" stroke-width="1.5" class="loading-room" style="animation-delay:0.4s"/>
      <rect x="110" y="110" width="50" height="50" fill="none" stroke="rgba(120,180,255,0.4)" stroke-width="1.5" class="loading-room" style="animation-delay:0.6s"/>
    </svg>
    <div class="loading-text">TERVRAJZ KÉSZÜL</div>
    <div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>
  </div>

  <!-- ═══ Főoldal: Blueprint Ház ═══ -->
  <div id="blueprint-house" class="view active">

    <header class="house-header">
      <div class="header-line"></div>
      <h1 class="house-title">Boldog Szülinapot, Apu!</h1>
      <p class="house-subtitle">Fedezd fel a szobákat — minden ajtó mögött meglepetés vár</p>
      <div class="header-line"></div>
    </header>

    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
        <div class="progress-bar-glow" id="progress-glow"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 11 szoba felfedezve</span>
    </div>

    <!-- Blueprint frame -->
    <div class="blueprint-frame">
      <!-- Title block (architectural style) -->
      <div class="title-block">
        <div class="title-block__row">
          <span class="title-block__label">PROJEKT</span>
          <span class="title-block__value">Szülinapi Meglepetés Ház</span>
        </div>
        <div class="title-block__row">
          <span class="title-block__label">MÉRETARÁNY</span>
          <span class="title-block__value">1 : 50</span>
        </div>
        <div class="title-block__row">
          <span class="title-block__label">DÁTUM</span>
          <span class="title-block__value">2026. ÁPRILIS</span>
        </div>
      </div>

      <!-- Room grid -->
      <div class="room-grid" id="room-grid"></div>

      <!-- Compass -->
      <svg class="compass-rose" viewBox="0 0 60 60" width="50" height="50">
        <circle cx="30" cy="30" r="28" fill="none" stroke="rgba(120,180,255,0.15)" stroke-width="0.5"/>
        <circle cx="30" cy="30" r="20" fill="none" stroke="rgba(120,180,255,0.1)" stroke-width="0.5"/>
        <line x1="30" y1="5" x2="30" y2="55" stroke="rgba(120,180,255,0.12)" stroke-width="0.5"/>
        <line x1="5" y1="30" x2="55" y2="30" stroke="rgba(120,180,255,0.12)" stroke-width="0.5"/>
        <polygon points="30,6 27,18 33,18" fill="rgba(246,173,85,0.4)"/>
        <text x="30" y="4" text-anchor="middle" fill="rgba(246,173,85,0.5)" font-size="7" font-family="JetBrains Mono">É</text>
        <text x="56" y="33" text-anchor="middle" fill="rgba(120,180,255,0.2)" font-size="6" font-family="JetBrains Mono">K</text>
        <text x="30" y="59" text-anchor="middle" fill="rgba(120,180,255,0.2)" font-size="6" font-family="JetBrains Mono">D</text>
        <text x="4" y="33" text-anchor="middle" fill="rgba(120,180,255,0.2)" font-size="6" font-family="JetBrains Mono">Ny</text>
      </svg>

      <!-- Approval stamp -->
      <div class="stamp">
        <div class="stamp__inner">JÓVÁHAGYVA</div>
      </div>
    </div>
  </div>

  <!-- ═══ Minijáték overlay ═══ -->
  <div id="minigame-overlay" class="view overlay">
    <button class="back-btn" id="back-to-house" aria-label="Vissza a házba">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="minigame-container"></div>
  </div>

  <!-- ═══ Tartalom overlay ═══ -->
  <div id="content-overlay" class="view overlay">
    <button class="back-btn" id="back-from-content" aria-label="Vissza a házba">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="content-container"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
